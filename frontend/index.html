<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered Smart City Navigation with real-time traffic prediction and multi-route optimization" />
    <meta name="theme-color" content="#2563eb" />
    <title>Smart City Navigator - AI-Powered Route Optimization</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS (required for map rendering) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""/>
    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Loading screen shown before React mounts */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #eff6ff;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.3s ease;
      }
      #app-loader svg {
        animation: spin 1s linear infinite;
      }
      #app-loader p {
        color: #2563eb;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (hidden once React mounts) -->
    <div id="app-loader">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5">
        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
      </svg>
      <p>Loading Smart City Navigator…</p>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <!-- Hide loader once React has mounted -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('app-loader');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => loader.remove(), 300);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
